spring.datasource.url=jdbc:h2:mem:socialpublish;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable spring session redis during H2 tests
spring.session.store-type=none

# Disable RabbitMQ auto-startup for tests
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

# Override other external services if necessary
app.security.oauth2.redirect-uri=http://localhost:8080/login/oauth2/code/google
