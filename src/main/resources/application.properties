spring.application.name=social-publish
spring.config.import=optional:classpath:application-security.properties

spring.datasource.url=${app.secrets.datasource.url:jdbc:postgresql://localhost:5432/socialpublish}
spring.datasource.username=${app.secrets.datasource.username:postgres}
spring.datasource.password=${app.secrets.datasource.password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.security.oauth2.redirect-uri=${app.secrets.oauth2.redirect-uri}

spring.security.oauth2.client.registration.google.client-id=${app.secrets.google.client-id}
spring.security.oauth2.client.registration.google.client-secret=${app.secrets.google.client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.messages.basename=messages,messages_ai

spring.docker.compose.enabled=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.rabbitmq.host=${app.secrets.rabbitmq.host:localhost}
spring.rabbitmq.port=${app.secrets.rabbitmq.port:5672}
spring.rabbitmq.username=${app.secrets.rabbitmq.username:guest}
spring.rabbitmq.password=${app.secrets.rabbitmq.password:guest}
spring.rabbitmq.listener.simple.missing-queues-fatal=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=5000
spring.rabbitmq.listener.simple.retry.max-retries=3

spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate

app.publishing.max-retries=3
app.publishing.retry-delay-ms=30000

cloudinary.cloud_name=${app.secrets.cloudinary.cloud-name:}
cloudinary.api_key=${app.secrets.cloudinary.api-key:}
cloudinary.api_secret=${app.secrets.cloudinary.api-secret:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

reddit.client-id=${app.secrets.reddit.client-id:}
reddit.client-secret=${app.secrets.reddit.client-secret:}
reddit.redirect-uri=${app.secrets.reddit.redirect-uri:}

linkedin.client-id=${app.secrets.linkedin.client-id:}
linkedin.client-secret=${app.secrets.linkedin.client-secret:}
linkedin.redirect-uri=${app.secrets.linkedin.redirect-uri:}

spring.mail.host=${app.secrets.mail.host:smtp.gmail.com}
spring.mail.port=${app.secrets.mail.port:587}
spring.mail.username=${app.secrets.mail.username:}
spring.mail.password=${app.secrets.mail.password:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

app.mail.from-name=Social Publish
app.mail.from-address=${app.secrets.mail.username:}

app.ai.assistant.provider=${app.secrets.ai.provider:groq}
app.ai.assistant.groq.api-url=${app.secrets.groq.api-url:https://api.groq.com/openai/v1/chat/completions}
app.ai.assistant.groq.api-key=${app.secrets.groq.api-key:}
app.ai.assistant.groq.model=${app.secrets.groq.model:llama-3.3-70b-versatile}
app.ai.assistant.groq.temperature=${app.secrets.groq.temperature:0.3}
app.ai.assistant.groq.max-tokens=${app.secrets.groq.max-tokens:900}
