<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'edit' ? 'Edit Post' : 'Create Post'}">Post Form</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="editor-page">
<main class="editor-wrap">
    <header class="editor-head">
        <a href="/" class="action-link">&larr; Back to Dashboard</a>
        <h1 th:text="${mode == 'edit' ? 'Edit Post' : 'Create Post'}">Create Post</h1>
        <p>Manage DRAFT, SCHEDULED, PUBLISHED, and FAILED states.</p>
    </header>

    <form class="post-form"
          th:object="${postRequest}"
          method="post"
          th:action="${mode == 'edit'} ? @{|/posts/${postId}|} : @{/posts}"
          th:attr="hx-post=${mode == 'edit'} ? @{|/posts/${postId}|} : @{/posts}"
          hx-target="#post-form-status"
          hx-swap="innerHTML">
        <div id="post-form-status"
             th:replace="~{fragments/posts/form-status :: status}">
        </div>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="field">
            <label for="title">Title</label>
            <input id="title" th:field="*{title}" type="text" maxlength="150" required>
        </div>

        <div class="field">
            <label for="content">Content</label>
            <textarea id="content" th:field="*{content}" rows="8" maxlength="5000" required></textarea>
        </div>

        <div class="field-grid">
            <div class="field">
                <label for="status">Status</label>
                <select id="status" th:field="*{status}" required>
                    <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                </select>
            </div>
            <div class="field">
                <label for="scheduledAt">Scheduled At</label>
                <input id="scheduledAt" th:field="*{scheduledAt}" type="datetime-local">
            </div>
        </div>

        <div class="field">
            <label for="failedReason">Failure Reason (for FAILED status)</label>
            <input id="failedReason" th:field="*{failedReason}" type="text" maxlength="500">
        </div>

        <div class="actions">
            <button type="submit" th:text="${mode == 'edit' ? 'Save Changes' : 'Create Post'}">Create Post</button>
            <a class="btn-link btn-secondary" href="/">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
