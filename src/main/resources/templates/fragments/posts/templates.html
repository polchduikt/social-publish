<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="templates-list" id="templates-container">
    <details class="panel templates-inline-panel" th:open="${openTemplates}">
        <summary class="templates-summary">
            <span class="flex-align-center-gap-8">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                <span th:text="#{tmpl.savedTemplates}">Saved Templates</span>
            </span>
            <span class="flex-align-center-gap-12">
                <span class="templates-count" th:text="${#messages.msg('tmpl.templatesCount', #lists.size(templates))}">0 templates</span>
                <svg class="templates-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </span>
        </summary>

        <div th:if="${#lists.isEmpty(templates)}" class="templates-empty" th:text="#{tmpl.noTemplates}">
            No templates saved yet. Create a post and click "Save as Template".
        </div>

        <div th:unless="${#lists.isEmpty(templates)}" class="templates-grid">
            <div th:each="t : ${templates}" class="template-inline-card template-card-dark" th:attr="data-content=${t.content}, data-platforms=${t.platforms}">
                <div>
                    <h4 th:text="${t.templateName}" class="template-card-dark-title">Template Name</h4>
                    <div class="template-card-dark-platforms">
                        <span th:if="${#strings.isEmpty(t.platforms)}" class="template-platform-none" th:text="#{tmpl.noPlatforms}">No platforms</span>
                        <span th:unless="${#strings.isEmpty(t.platforms)}" th:each="p : ${#strings.arraySplit(t.platforms, ',')}" th:text="${p}" class="template-platform-badge-blue">Platform</span>
                    </div>
                </div>
                <div>
                    <p class="template-card-dark-date" th:text="${#messages.msg('tmpl.updated', #dates.format(t.updatedAt, 'MMM dd, yyyy'))}">Date</p>
                    <div class="template-card-dark-actions">
                        <button type="button" class="btn-apply-template" th:text="#{tmpl.apply}">Apply Template</button>
                        <button type="button" class="btn-delete-template"
                                th:attr="hx-delete='/posts/templates/' + ${t.id}"
                                hx-target="#templates-container"
                                hx-swap="outerHTML"
                                th:text="#{tmpl.delete}">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </details>
</div>
</body>
</html>
