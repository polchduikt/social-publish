<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="error-page">
    <h1>Something went wrong</h1>
    <p th:text="${error != null ? error : 'An unexpected error occurred'}">An unexpected error occurred</p>
    <a th:href="@{/}">Back to Dashboard</a>
</div>
</body>
</html>
