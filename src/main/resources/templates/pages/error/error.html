<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark-mode');}</script>
    <meta charset="UTF-8">
    <title>Error</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/dark.css}">
</head>
<body>
<div class="error-page">
    <h1>Something went wrong</h1>
    <p th:text="${error != null ? error : 'An unexpected error occurred'}">An unexpected error occurred</p>
    <a th:href="@{/}">Back to Dashboard</a>
</div>
<div th:replace="~{fragments/layout/ai-assistant :: assistant}"></div>
</body>
</html>
