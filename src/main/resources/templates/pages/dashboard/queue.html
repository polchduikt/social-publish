<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><link rel="icon" type="image/png" href="/images/logo.png">
    <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark-mode');}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{queue.title} + ' - ' + #{nav.title}">Content Queue - Social Publish</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/queue.css">
    <link rel="stylesheet" href="/css/toasts.css">
    <link rel="stylesheet" href="/css/dark.css">
</head>
<body class="dashboard-page" th:attr="data-user-id=${user.id}">
<div class="app-layout">
    <div th:replace="~{fragments/layout/navbar :: navbar}"></div>

    <div class="dashboard-shell">
        <div th:replace="~{fragments/layout/sidebar :: sidebar('queue')}"></div>

        <main class="dashboard-main">
            <div id="page-messages" style="display: none;"
                 th:data-raw-msg="${message}"
                 th:data-raw-err="${error}"
                 th:data-post-deleted="#{post.msg.deleted}"
                 th:data-post-created="#{post.msg.created}"
                 th:data-post-updated="#{post.msg.updated}"
                 th:data-post-queued="#{post.msg.queued}"
                 th:data-post-notfound="#{post.msg.notFound}">
            </div>

            <section class="queue-metrics-grid">
                <article class="queue-metric-card">
                    <h3 th:text="#{queue.stats.scheduled}">Scheduled</h3>
                    <p th:text="${queue.stats.scheduled}">0</p>
                </article>
                <article class="queue-metric-card">
                    <h3 th:text="#{queue.stats.published}">Published</h3>
                    <p th:text="${queue.stats.published}">0</p>
                </article>
                <article class="queue-metric-card">
                    <h3 th:text="#{queue.stats.failed}">Failed</h3>
                    <p th:text="${queue.stats.failed}">0</p>
                </article>
                <article class="queue-metric-card">
                    <h3 th:text="#{queue.stats.drafts}">Drafts</h3>
                    <p th:text="${queue.stats.drafts}">0</p>
                </article>
                <article class="queue-metric-card next-post-card">
                    <h3 th:text="#{queue.stats.nextPost}">Next post in</h3>
                    <p th:if="${queue.nextScheduledAt != null}" th:text="${queue.nextPostCountdown()}">-</p>
                    <p th:if="${queue.nextScheduledAt == null}">-</p>
                    <span th:if="${queue.nextScheduledAt != null}"
                          th:text="${#temporals.format(queue.nextScheduledLocalDateTime(), 'MMM dd, HH:mm')}">-</span>
                </article>
            </section>

            <div class="queue-layout">
                <aside class="panel queue-sidebar">
                    <h3 th:text="#{queue.filters.title}">Filters</h3>
                    <form method="get" action="/queue" class="queue-sidebar-form">
                        <input type="hidden" name="search" th:value="${filters.search}">
                        <input type="hidden" name="tag" th:value="${filters.tag}">
                        <input type="hidden" name="sort" th:value="${filters.sort}">
                        <input type="hidden" name="size" th:value="${filters.size}">

                        <div class="queue-filter-group">
                            <h4 th:text="#{queue.table.status}">Status</h4>
                            <label class="queue-radio">
                                <input type="radio" name="status" value="" th:checked="${filters.status == null or filters.status == ''}">
                                <span th:text="#{queue.filters.all}">All</span>
                            </label>
                            <label th:each="s : ${statusOptions}" class="queue-radio">
                                <input type="radio" name="status" th:value="${s}"
                                       th:checked="${filters.status == s}">
                                <span th:text="${#messages.msg('status.' + s)}">DRAFT</span>
                            </label>
                        </div>

                        <div class="queue-filter-group">
                            <h4 th:text="#{queue.filters.byPlatform}">By platform</h4>
                            <label th:each="option : ${platformOptions}"
                                   th:if="${option.name() != 'ALL' and option.name() != 'REDDIT' and option.name() != 'WHATSAPP'}"
                                   class="filter-checkbox-label">
                                <input type="checkbox" name="platform" th:value="${option.name()}"
                                       th:checked="${filters.platform.contains(option)}">
                                <div th:replace="~{fragments/ui/icons :: platform-icon(${option.name()}, 'sm')}" style="margin-right: 8px;"></div>
                                <span th:text="${#messages.msg('platform.' + option.name())}">Telegram</span>
                            </label>
                        </div>

                        <div class="queue-filter-group">
                            <h4 th:text="#{queue.filters.byType}">By type</h4>
                            <label th:each="option : ${typeOptions}" 
                                   th:if="${option.name() != 'ALL'}"
                                   class="filter-checkbox-label">
                                <input type="checkbox" name="type" th:value="${option.name()}"
                                       th:checked="${filters.type.contains(option)}">
                                <span th:text="${#messages.msg('post.type.' + option.name())}">Text</span>
                            </label>
                        </div>

                        <div class="queue-filter-group">
                            <h4 th:text="#{queue.filters.byDate}">By date</h4>
                            <label th:each="option : ${dateRangeOptions}" class="queue-radio">
                                <input type="radio" name="dateRange" th:value="${option.name()}"
                                       th:checked="${filters.dateRange.name() == option.name()}">
                                <span th:text="${#messages.msg('dateRange.' + option.name())}">All</span>
                            </label>
                        </div>

                        <button type="submit" class="btn-link btn-sm w-100" th:text="#{queue.filters.apply}">Apply filters</button>
                    </form>
                </aside>

                <section class="panel queue-main-panel">
                    <form method="get" action="/queue" class="queue-toolbar">
                        <input type="hidden" name="status" th:value="${filters.status}">
                        <th:block th:each="p : ${filters.platform}">
                            <input type="hidden" name="platform" th:value="${p}">
                        </th:block>
                        <th:block th:each="t : ${filters.type}">
                            <input type="hidden" name="type" th:value="${t}">
                        </th:block>
                        <input type="hidden" name="dateRange" th:value="${filters.dateRange}">
                        <input type="hidden" name="size" th:value="${filters.size}">

                        <div class="queue-search-wrap">
                            <input type="search" name="search" th:placeholder="#{queue.searchPlaceholder}" th:value="${filters.search}">
                            <input type="text" name="tag" th:placeholder="#{queue.tagPlaceholder}" th:value="${filters.tag}">
                        </div>
                        <div class="queue-sort-wrap">
                            <label for="sort" th:text="#{queue.sort}">Sort</label>
                            <select id="sort" name="sort">
                                <option th:each="option : ${sortOptions}"
                                        th:value="${option.name()}"
                                        th:selected="${filters.sort.name() == option.name()}"
                                        th:text="${#strings.replace(option.name(), '_', ' ')}">NEWEST</option>
                            </select>
                            <button type="submit" class="btn-link btn-sm" th:text="#{queue.apply}">Apply</button>
                        </div>
                    </form>

                    <form id="bulkActionForm" method="post" action="/queue/bulk">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="status" th:value="${filters.status}">
                        <input type="hidden" name="search" th:value="${filters.search}">
                        <input type="hidden" name="tag" th:value="${filters.tag}">
                        <th:block th:each="p : ${filters.platform}">
                            <input type="hidden" name="platform" th:value="${p}">
                        </th:block>
                        <th:block th:each="t : ${filters.type}">
                            <input type="hidden" name="type" th:value="${t}">
                        </th:block>
                        <input type="hidden" name="dateRange" th:value="${filters.dateRange}">
                        <input type="hidden" name="sort" th:value="${filters.sort}">
                        <input type="hidden" name="size" th:value="${filters.size}">

                        <div class="bulk-actions-bar">
                            <label class="bulk-select-all">
                                <input id="selectAllPosts" type="checkbox">
                                <span th:text="#{queue.selectAll}">Select all</span>
                            </label>
                            <select id="bulkAction" name="action" required>
                                <option value="" selected disabled th:text="#{queue.bulkAction}">Bulk action</option>
                                <option th:each="action : ${bulkActions}"
                                        th:value="${action.name()}"
                                        th:text="${#strings.replace(action.name(), '_', ' ')}">PUBLISH NOW</option>
                            </select>
                            <input id="bulkScheduleAt" name="scheduledAt" type="datetime-local" class="bulk-date-input">
                            <button type="submit" class="btn-link btn-sm" th:text="#{queue.run}">Run</button>
                        </div>

                        <div class="posts-table-wrap">
                            <table class="posts-table queue-table">
                                <thead>
                                <tr>
                                    <th class="check-col"></th>
                                    <th th:text="#{queue.table.content}">Content</th>
                                    <th th:text="#{queue.table.platforms}">Platforms</th>
                                    <th th:text="#{queue.table.scheduled}">Scheduled For</th>
                                    <th th:text="#{queue.table.status}">Status</th>
                                    <th th:text="#{queue.table.actions}">Actions</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="post : ${queue.posts}" th:attr="data-post-id=${post.id}">
                                    <td class="check-col">
                                        <input type="checkbox" name="postIds" th:value="${post.id}" class="row-post-checkbox">
                                    </td>
                                    <td class="queue-preview-cell">
                                        <div class="queue-content-wrap">
                                            <div class="queue-thumb"
                                                 th:if="${!#lists.isEmpty(post.media) and !post.media[0].isVideo()}">
                                                <img th:src="${post.media[0].url}" alt="Post media preview">
                                            </div>
                                            <div class="queue-thumb queue-thumb-video"
                                                 th:if="${(!#lists.isEmpty(post.media) and post.media[0].isVideo()) or (#lists.isEmpty(post.media) and (#strings.containsIgnoreCase(post.content, '.mp4') or #strings.containsIgnoreCase(post.content, '.mov') or #strings.containsIgnoreCase(post.content, '.webm')))}">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <polygon points="5 3 19 12 5 21 5 3"/>
                                                </svg>
                                            </div>
                                            <div class="queue-content-text">
                                                <div class="queue-title-row">
                                                    <strong th:text="${post.title}">Title</strong>
                                                    <svg th:if="${post.recurring}" class="recurring-badge-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" th:title="#{post.recurring}">
                                                        <path d="M17 1l4 4-4 4"/>
                                                        <path d="M3 11V9a4 4 0 014-4h14"/>
                                                        <path d="M7 23l-4-4 4-4"/>
                                                        <path d="M21 13v2a4 4 0 01-4 4H3"/>
                                                    </svg>
                                                </div>
                                                <p th:text="${post.excerpt()}">Excerpt</p>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <div class="queue-platform-list">
                                            <th:block th:each="p : ${post.platformList()}">
                                                <div th:replace="~{fragments/ui/icons :: platform-icon(${p}, 'sm')}"></div>
                                            </th:block>
                                        </div>
                                        <span th:if="${#lists.isEmpty(post.platformList())}" class="queue-platform-chip text-muted-slate" th:text="#{queue.unspecified}">
                                            Unspecified
                                        </span>
                                    </td>
                                    <td class="queue-date-cell">
                                    <span th:if="${post.scheduledAt != null}">
                                        <strong th:text="${#temporals.format(post.scheduledAt, 'MMM dd, yyyy')}">May 01, 2026</strong>
                                        <span class="queue-time" th:text="${#temporals.format(post.scheduledAt, 'HH:mm')}">12:00</span>
                                    </span>
                                        <span th:if="${post.scheduledAt == null}" class="queue-time">-</span>
                                    </td>
                                    <td>
                                    <span class="status-badge"
                                          th:classappend="${#strings.toLowerCase(post.status)}"
                                          th:text="${#messages.msg('status.' + post.status)}">DRAFT</span>
                                    </td>
                                    <td>
                                        <div class="row-actions">
                                            <a th:href="@{|/posts/${post.id}/edit|}" class="icon-action" th:title="#{queue.editTitle}" th:aria-label="#{queue.editTitle}">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <path d="M12 20h9"/>
                                                    <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
                                                </svg>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(queue.posts)}">
                                    <td colspan="6" class="empty-row" th:text="#{queue.empty}">No posts in queue.</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    <div class="queue-footer">
                        <span class="queue-count" th:text="${queue.totalFiltered} + ' ' + #{queue.results}">0 results</span>
                        <a th:if="${queue.hasMore}"
                           class="btn-secondary btn-sm"
                           th:href="@{/queue(status=${filters.status},search=${filters.search},tag=${filters.tag},platform=${filters.platform},type=${filters.type},dateRange=${filters.dateRange},sort=${filters.sort},size=${queue.nextSize})}">
                            <span th:text="#{queue.loadMore}">Load more</span>
                        </a>
                    </div>
                </section>
            </div>
        </main>
    </div>
</div>
<div id="toast-container"></div>
<script src="/js/queue.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2/lib/stomp.min.js"></script>
<script src="/js/notifications.js"></script>
</body>
</html>
