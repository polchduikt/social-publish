<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><link rel="icon" type="image/png" href="/images/logo.png">
    <script>if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark-mode');}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{acc.notionConfig} + ' — Social Publish'">notion Settings — Social Publish</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/integrations.css">
    <link rel="stylesheet" href="/css/toasts.css">
    <link rel="stylesheet" href="/css/dark.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="dashboard-page" th:attr="data-user-id=${user.id}">
<div class="app-layout">
    <div th:replace="~{fragments/layout/navbar :: navbar}"></div>

    <div class="dashboard-shell">
        <div th:replace="~{fragments/layout/sidebar :: sidebar('accounts')}"></div>

        <main class="dashboard-main">

            <div class="status-stack" th:if="${param.message != null or param.error != null}">
                <div class="status success" th:if="${param.message != null}" th:text="${param.message[0]}"></div>
                <div class="status error" th:if="${param.error != null}" th:text="${param.error[0]}"></div>
            </div>

            <div class="breadcrumb mb-20">
                <a href="/accounts" class="breadcrumb-link" th:text="'&larr; ' + #{acc.backToAccounts}">&larr; Back to Accounts</a>
            </div>

            <section class="panel setup-panel">
                <div class="card-header">
                    <h3 th:text="#{acc.notionConfig}">notion Bot Configuration</h3>
                    <span class="step-badge" th:text="${notionSettings.configured() ? #messages.msg('acc.connectedStatus') : #messages.msg('acc.setupRequired')}">Status</span>
                </div>

                <div class="integration-grid">
                    <div>
                        <div class="setup-steps">
                            <div class="setup-step">
                                <span class="step-num">1</span>
                                <div>
                                    <strong th:text="#{acc.notionStep1Title}">Integration</strong>
                                    <p th:utext="#{acc.notionStep1Desc}">Create an internal integration at <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations</a></p>
                                </div>
                            </div>
                            <div class="setup-step">
                                <span class="step-num">2</span>
                                <div>
                                    <strong th:text="#{acc.notionStep2Title}">Token</strong>
                                    <p th:utext="#{acc.notionStep2Desc}">Copy the Internal Integration Token provided by Notion</p>
                                </div>
                            </div>
                            <div class="setup-step">
                                <span class="step-num">3</span>
                                <div>
                                    <strong th:text="#{acc.notionStep3Title}">Share</strong>
                                    <p th:utext="#{acc.notionStep3Desc}">Open your database and share it with the created integration</p>
                                </div>
                            </div>
                        </div>

                        <form th:action="@{/accounts/notion}" method="post"
                              hx-post="/accounts/notion" hx-target="#notion-status" hx-swap="innerHTML"
                              class="integration-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="field">
                                <label for="apiToken" th:text="#{acc.apiToken}">API Token</label>
                                <input type="password" id="apiToken" name="apiToken" required autocomplete="off"
                                       th:placeholder="${notionSettings.configured() ? notionSettings.apiToken() : 'secret_...'}"/>
                            </div>
                            <div class="field">
                                <label for="databaseId" th:text="#{acc.databaseId}">Database ID</label>
                                <input type="text" id="databaseId" name="databaseId" required
                                       th:value="${notionSettings.configured() ? notionSettings.databaseId() : ''}"
                                       th:placeholder="${#messages.msg('acc.databaseIdPlaceholder')}"/>
                            </div>
                            <div id="notion-status"></div>
                            <div class="field checkbox-field">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="enabled" value="true"
                                           th:checked="${!notionSettings.configured() or notionSettings.enabled()}" />
                                    <span th:text="#{acc.enableIntegration}">Enable integration</span>
                                </label>
                            </div>
                            <div id="tg-status"></div>
                            <button type="submit" th:text="#{acc.saveConfig}">Save Configuration</button>
                        </form>
                    </div>

                    <div th:if="${notionSettings.configured()}">
                        <div th:if="${notionSettings.enabled()}">
                            <h4 class="mb-12" th:text="#{acc.sendTestMessage}">Send Test Message</h4>
                            <form th:action="@{/accounts/notion/test}" method="post"
                                  hx-post="/accounts/notion/test" hx-target="#test-status" hx-swap="innerHTML">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div class="field">
                                    <textarea id="testMessage" name="testMessage" rows="3" th:placeholder="#{acc.testPlaceholder}" th:text="#{acc.testPlaceholder}">Hello from Social Publish!</textarea>
                                </div>
                                <div id="test-status"></div>
                                <button type="submit" class="btn-test">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                                    <span th:text="#{acc.sendTest}">Send Test</span>
                                </button>
                            </form>
                        </div>
                        
                        <form th:action="@{/accounts/notion/disconnect}" method="post" class="mt-12"
                              th:attr="onsubmit='return confirm(\'' + #{acc.deleteConfirm} + '\');'">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-danger btn-danger-outline" th:text="#{acc.disconnectNotion}">Disconnect Notion API</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2/lib/stomp.min.js"></script>
<script src="/js/notifications.js"></script>
</body>
</html>
