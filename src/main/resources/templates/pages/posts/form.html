<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'edit' ? 'Edit Post' : 'Create Post'} + ' — Social Publish'">Post Form</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/posts.css">
    <link rel="stylesheet" href="/css/toasts.css">
    <link rel="stylesheet" href="/css/dark.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body th:attr="data-user-id=${user.id}">
<div class="app-layout">
    <div th:replace="~{fragments/layout/navbar :: navbar}"></div>

    <div class="dashboard-shell">
        <div th:replace="~{fragments/layout/sidebar :: sidebar('creator')}"></div>

        <main class="dashboard-main">
            <div id="post-form-status"
                 th:insert="~{fragments/posts/form-status :: status}">
            </div>

            <form class="creator-layout"
                  th:object="${postRequest}"
                  method="post"
                  th:action="${mode == 'edit'} ? @{|/posts/${postId}|} : @{/posts}"
                  th:attr="hx-post=${mode == 'edit'} ? @{|/posts/${postId}|} : @{/posts}"
                  hx-target="#post-form-status"
                  hx-swap="innerHTML">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">


                <div class="creator-content">

                    <section class="panel platform-panel">
                        <h3 class="panel-title">Select Platforms</h3>
                        <div class="platform-chips">
                            <label class="platform-chip"
                                   th:classappend="${telegramConnected} ? 'platform-connected' : 'platform-disconnected'">
                                <input type="checkbox"
                                       name="platforms"
                                       value="TELEGRAM"
                                       th:checked="${postRequest.platforms != null and #lists.contains(postRequest.platforms, 'TELEGRAM')}"
                                       th:disabled="${!telegramConnected}"/>
                                <span class="platform-chip-inner">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
                                    Telegram
                                </span>
                            </label>

                            <label class="platform-chip"
                                   th:classappend="${discordConnected} ? 'platform-connected' : 'platform-disconnected'">
                                <input type="checkbox"
                                       name="platforms"
                                       value="DISCORD"
                                       th:checked="${postRequest.platforms != null and #lists.contains(postRequest.platforms, 'DISCORD')}"
                                       th:disabled="${!discordConnected}"/>
                                <span class="platform-chip-inner">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
                                    Discord
                                </span>
                            </label>

                            <label class="platform-chip platform-disconnected platform-disabled">
                                <input type="checkbox" disabled/>
                                <span class="platform-chip-inner">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/></svg>
                                    Instagram
                                </span>
                            </label>
                        </div>
                        <p class="platform-hint" th:unless="${telegramConnected or discordConnected}">
                            <a href="/accounts" class="inline-link">Connect platforms</a> to start publishing.
                        </p>
                    </section>


                    <section class="panel message-panel">
                        <div class="editor-toolbar">
                            <span class="toolbar-label">Message</span>
                            <span class="char-count"><span id="charCount">0</span>/5000</span>
                        </div>
                        <div class="field mb-0">
                            <textarea id="content" th:field="*{content}" rows="6" maxlength="5000"
                                      placeholder="What do you want to share?" required></textarea>
                        </div>
                    </section>
                </div>


                <div class="creator-sidebar">
                    <section class="panel creator-scheduling">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Scheduling
                        </h3>

                        <div class="field">
                            <label for="title">Title</label>
                            <input id="title" th:field="*{title}" type="text" maxlength="150"
                                   placeholder="Post title" required>
                        </div>

                        <div class="field">
                            <label for="scheduledAt">Date & Time</label>
                            <input id="scheduledAt" th:field="*{scheduledAt}" type="text" placeholder="Select date and time...">
                        </div>

                        <div class="creator-actions">
                            <button type="submit" name="status" value="SCHEDULED" class="btn-schedule">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                <span th:text="${mode == 'edit' ? 'Save Changes' : 'Schedule Post'}">Schedule Post</span>
                            </button>
                            <button type="submit" name="status" value="DRAFT" class="btn-draft-action">
                                Save as Draft
                            </button>
                        </div>
                    </section>


                    <section class="panel creator-preview">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            Preview
                        </h3>
                        <div class="preview-box">
                            <strong id="previewTitle" class="preview-title">Your title here</strong>
                            <p id="previewContent" class="preview-text">Your content will appear here...</p>
                        </div>
                    </section>
                </div>
            </form>
        </main>
    </div>
</div>
<div id="toast-container"></div>
<script>
    flatpickr("#scheduledAt", {
        enableTime: true,
        dateFormat: "Y-m-d\\TH:i",
        altInput: true,
        altFormat: "Y-m-d H:i",
        time_24hr: true,
        minDate: "today",
        minuteIncrement: 1,
        defaultHour: new Date().getHours(),
        defaultMinute: new Date().getMinutes()
    });

    (function() {
        var content = document.getElementById('content');
        var title = document.getElementById('title');
        var charCount = document.getElementById('charCount');
        var previewTitle = document.getElementById('previewTitle');
        var previewContent = document.getElementById('previewContent');

        function updatePreview() {
            if (previewTitle) previewTitle.textContent = title.value || 'Your title here';
            if (previewContent) previewContent.textContent = content.value || 'Your content will appear here...';
            if (charCount) charCount.textContent = content.value.length;
        }

        content.addEventListener('input', updatePreview);
        title.addEventListener('input', updatePreview);
        updatePreview();
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2/lib/stomp.min.js"></script>
<script src="/js/notifications.js"></script>
</body>
</html>
