<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #f1f5f9; margin: 0; padding: 0; background-color: #0b1120; }
        .wrapper { padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #111827; border-radius: 24px; overflow: hidden; border: 1px solid #1f2937; }
        .header { background: #0b1120; padding: 40px; text-align: center; border-bottom: 1px solid #1f2937; }
        .header h1 { margin: 0; font-size: 24px; color: #ffffff; letter-spacing: -0.02em; font-weight: 800; }
        .header p { margin: 8px 0 0; font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
        .content { padding: 40px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1f2937; padding: 24px; border-radius: 16px; border: 1px solid #374151; text-align: center; }
        .stat-value { display: block; font-size: 32px; font-weight: 800; color: #ffffff; letter-spacing: -0.03em; }
        .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 700; letter-spacing: 0.12em; margin-top: 6px; }
        .progress-list { margin-top: 32px; }
        .progress-item { margin-bottom: 18px; }
        .progress-head { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
        .progress-bar { height: 8px; background: #0b1120; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; }
        .footer { padding: 32px; text-align: center; font-size: 11px; color: #4b5563; border-top: 1px solid #1f2937; }
        .btn { display: inline-block; padding: 14px 28px; background-color: #4f46e5; color: #ffffff !important; text-decoration: none; border-radius: 12px; font-weight: 700; font-size: 14px; margin-top: 32px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>Weekly Report</h1>
                <p th:text="${period}">May 06 - May 13, 2026</p>
            </div>
            <div class="content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value" th:text="${stats.totalPosts}">33</span>
                        <span class="stat-label">Total Posts</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" th:text="${#numbers.formatDecimal(stats.successRate, 1, 1)} + '%'">85.5%</span>
                        <span class="stat-label">Success Rate</span>
                    </div>
                </div>

                <h3 style="font-size: 15px; font-weight: 700; color: #ffffff; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em;">Performance Breakdown</h3>
                
                <div class="progress-list">
                    <div class="progress-item">
                        <div class="progress-head">
                            <span>Published</span>
                            <span th:text="${stats.publishedPosts}" style="color: #10b981;">20</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" th:style="'background: #10b981; width: ' + (stats.totalPosts > 0 ? (stats.publishedPosts * 100 / stats.totalPosts) : 0) + '%'"></div></div>
                    </div>
                    <div class="progress-item">
                        <div class="progress-head">
                            <span>Scheduled</span>
                            <span th:text="${stats.scheduledPosts}" style="color: #3b82f6;">10</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" th:style="'background: #3b82f6; width: ' + (stats.totalPosts > 0 ? (stats.scheduledPosts * 100 / stats.totalPosts) : 0) + '%'"></div></div>
                    </div>
                    <div class="progress-item">
                        <div class="progress-head">
                            <span>Failed</span>
                            <span th:text="${stats.failedPosts}" style="color: #ef4444;">3</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" th:style="'background: #ef4444; width: ' + (stats.totalPosts > 0 ? (stats.failedPosts * 100 / stats.totalPosts) : 0) + '%'"></div></div>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 40px;">
                    <a href="https://social-publish.com/dashboard" class="btn">Analyze Full History</a>
                </div>
            </div>
            <div class="footer">
                &copy; 2026 Social Publish. All rights reserved.<br>
                You can unsubscribe from these reports in your account settings.
            </div>
        </div>
    </div>
</body>
</html>
