            </div>
            <div class="modal-footer modal-footer-actions">
                <button type="button" class="btn-secondary" id="btnCancelSaveTemplate"
                    th:text="#{tmpl.cancel}">Cancel</button>
                <button type="button" class="btn-primary" id="btnConfirmSaveTemplate" hx-post="/posts/templates"
                    hx-include="[name='platforms'], #content, #templateNameInput" hx-swap="none"
                    th:attr="data-toast-title=#{tmpl.savedTitle}, data-toast-msg=#{tmpl.savedMsg}"
                    hx-on::after-request="if(event.detail.successful) { document.getElementById('saveTemplateModal').classList.remove('active'); window.showToast({title: this.getAttribute('data-toast-title'), message: this.getAttribute('data-toast-msg'), type: 'success'}); document.getElementById('templateNameInput').value = ''; }">
                    <span th:text="#{tmpl.save}">Save Template</span>
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/draft-store.js"></script>
    <script src="/js/post-creator.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2/lib/stomp.min.js"></script>
    <script src="/js/notifications.js"></script>
</body>
</html>
